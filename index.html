// ── Airtable API helpers ───────────────────────────────────────────────────
async function airtableFetchAll() {
  let all = [], offset = null;
  do {
    const url = offset ? `${AIRTABLE_URL}?offset=${offset}&pageSize=100` : `${AIRTABLE_URL}?pageSize=100`;
    const res = await fetch(url, { headers: AT_HEADERS });
    if (!res.ok) throw new Error(`Airtable error: ${res.status}`);
    const data = await res.json();
    all = all.concat(data.records);
    offset = data.offset;
  } while (offset);
  return all.map(r => ({
    id: r.id,
    date: r.fields.Date || "",
    property: r.fields.Property || "Falcon 9",
    category: r.fields.Category || "Listing Management",
    minutes: r.fields.Minutes || 0,
    note: r.fields.Note || "",
  }));
}

async function airtableCreate(entry) {
  const res = await fetch(AIRTABLE_URL, {
    method: "POST",
    headers: AT_HEADERS,
    body: JSON.stringify({ fields: {
      Date: entry.date,
      Property: entry.property,
      Category: entry.category,
      Minutes: entry.minutes,
      Note: entry.note || "",
    }})
  });
  if (!res.ok) throw new Error(`Create failed: ${res.status}`);
  const d = await res.json();
  return d.id;
}

async function airtableDelete(id) {
  const res = await fetch(`${AIRTABLE_URL}/${id}`, { method: "DELETE", headers: AT_HEADERS });
  if (!res.ok) throw new Error(`Delete failed: ${res.status}`);
}

async function airtableBulkCreate(entries) {
  // Airtable allows up to 10 records per batch
  const ids = [];
  for (let i = 0; i < entries.length; i += 10) {
    const batch = entries.slice(i, i + 10);
    const res = await fetch(AIRTABLE_URL, {
      method: "POST",
      headers: AT_HEADERS,
      body: JSON.stringify({ records: batch.map(e => ({ fields: {
        Date: e.date, Property: e.property, Category: e.category, Minutes: e.minutes, Note: e.note || "",
      }}))})
    });
    if (!res.ok) throw new Error(`Bulk create failed: ${res.status}`);
    const d = await res.json();
    d.records.forEach(r => ids.push(r.id));
  }
  return ids;
}

  const[form,setForm]=useState({property:"Falcon 9",category:CATEGORIES[0],hours:"",minutes:"",date:new Date().toISOString().slice(0,10),note:""});
  const[saved,setSaved]=useState(false);
  const[fProps,setFProps]=useState([]); // empty array = all
  const[fCats,setFCats]=useState([]); // empty array = all
  const[fStart,setFStart]=useState("");
  const[fEnd,setFEnd]=useState("");

  function toggleProp(p) { setFProps(s => s.includes(p) ? s.filter(x=>x!==p) : [...s,p]); }
  function toggleCat(c) { setFCats(s => s.includes(c) ? s.filter(x=>x!==c) : [...s,c]); }
  const[tim,setTim]=useState({running:false,start:null,elapsed:0,property:"Falcon 9",category:CATEGORIES[0]});
  const tRef=useRef(null);

  // Load entries from Airtable on mount; auto-seed on first run if empty
  useEffect(() => {
    (async () => {
      try {
        setSyncStatus("syncing");
        let data = await airtableFetchAll();
        // First-run: if Airtable is empty, seed it with historical data
        if (data.length === 0) {
          setErrMsg(`First run detected — uploading ${SEED_DATA.length} historical entries to Airtable. This may take 30 seconds…`);
          await airtableBulkCreate(SEED_DATA);
          data = await airtableFetchAll();
          setErrMsg("");
        }
        setEntries(data);
        setSyncStatus("ok");
        setLoading(false);
      } catch (e) {
        setSyncStatus("error");
        setErrMsg(e.message);
        setLoading(false);
      }
    })();
  }, []);

  // Timer tick
  useEffect(() => {
    if (tim.running) tRef.current = setInterval(() => setTim(t => ({...t, elapsed: Math.floor((Date.now() - t.start)/1000)})), 1000);
    else clearInterval(tRef.current);
    return () => clearInterval(tRef.current);
  }, [tim.running]);

  async function addEntry() {
    const h = parseInt(form.hours) || 0, m = parseInt(form.minutes) || 0;
    if (!h && !m) return;
    const entry = { property: form.property, category: form.category, minutes: h*60+m, date: form.date, note: form.note };
    setSyncStatus("syncing");
    try {
      const id = await airtableCreate(entry);
      setEntries([{...entry, id}, ...entries]);
      setForm(f => ({...f, hours:"", minutes:"", note:""}));
      setSaved(true); setTimeout(() => setSaved(false), 1800);
      setSyncStatus("ok");
    } catch (e) {
      setSyncStatus("error"); setErrMsg(e.message);
      alert("Failed to save: " + e.message);
    }
  }

  async function deleteEntry(id) {
    if (!confirm("Delete this entry?")) return;
    setSyncStatus("syncing");
    try {
      await airtableDelete(id);
      setEntries(entries.filter(e => e.id !== id));
      setSyncStatus("ok");
    } catch (e) {
      setSyncStatus("error"); setErrMsg(e.message);
      alert("Delete failed: " + e.message);
    }
  }

  function startTimer() { setTim(t => ({...t, running: true, start: Date.now(), elapsed: 0})); }
  async function stopTimer() {
    const m = Math.round(tim.elapsed/60);
    setTim(t => ({...t, running: false, elapsed: 0}));
    if (m <= 0) return;
    const entry = { property: tim.property, category: tim.category, minutes: m, date: new Date().toISOString().slice(0,10), note: "⏱ Live timer" };
    setSyncStatus("syncing");
    try {
      const id = await airtableCreate(entry);
      setEntries([{...entry, id}, ...entries]);
      setSyncStatus("ok");
    } catch (e) {
      setSyncStatus("error"); setErrMsg(e.message);
      alert("Timer save failed: " + e.message);
    }
  }
  function tFmt(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(sc).padStart(2,"0")}`;}

  async function refresh() {
    try {
      setSyncStatus("syncing");
      const data = await airtableFetchAll();
      setEntries(data);
      setSyncStatus("ok");
    } catch (e) {
      setSyncStatus("error"); setErrMsg(e.message);
    }
  }

  async function reseedFromCode() {
    if (!confirm("This will DELETE ALL entries in Airtable and re-upload the latest historical dataset baked into this app. Continue?")) return;
    if (!confirm("Are you absolutely sure? This cannot be undone.")) return;
    try {
      setSyncStatus("syncing");
      setErrMsg("Deleting all existing entries…");
      // Delete in batches of 10 (Airtable's max DELETE batch)
      for (let i = 0; i < entries.length; i += 10) {
        const batch = entries.slice(i, i + 10);
        const ids = batch.map(e => `records[]=${e.id}`).join("&");
        const res = await fetch(`${AIRTABLE_URL}?${ids}`, { method: "DELETE", headers: AT_HEADERS });
        if (!res.ok) throw new Error(`Delete batch failed: ${res.status}`);
      }
      setErrMsg(`Uploading ${SEED_DATA.length} fresh entries…`);
      await airtableBulkCreate(SEED_DATA);
      const data = await airtableFetchAll();
      setEntries(data);
      setErrMsg("");
      setSyncStatus("ok");
      alert(`✅ Reseeded with ${data.length} entries successfully!`);
    } catch (e) {
      setSyncStatus("error"); setErrMsg(e.message);
      alert("Reseed failed: " + e.message);
    }
  }

  const total = entries.reduce((a,e) => a + e.minutes, 0);
  const byProp = PROPERTIES.reduce((acc,p) => { acc[p] = entries.filter(e => e.property === p).reduce((a,e) => a + e.minutes, 0); return acc; }, {});
  const byCat = CATEGORIES.reduce((acc,c) => { acc[c] = entries.filter(e => e.category === c).reduce((a,e) => a + e.minutes, 0); return acc; }, {});
  const wkMap = {};
  entries.forEach(e => { if (e.date) { const w = weekOf(e.date); wkMap[w] = (wkMap[w]||0) + e.minutes; }});
  const wks = Object.entries(wkMap).sort((a,b) => new Date(a[0]) - new Date(b[0])).slice(-10).reverse();
  const mxW = Math.max(...wks.map(w => w[1]), 1);
  const filtered = entries
    .filter(e => {
      if (fProps.length > 0 && !fProps.includes(e.property)) return false;
      if (fCats.length > 0 && !fCats.includes(e.category)) return false;
      if (fStart && e.date && e.date < fStart) return false;
      if (fEnd && e.date && e.date > fEnd) return false;
      return true;
    })
    .sort((a,b) => new Date(b.date) - new Date(a.date));

  const S = {
    wrap:{fontFamily:"Georgia,serif",background:"#f7f3ee",minHeight:"100vh",color:"#2c2416"},
    hdr:{background:"linear-gradient(135deg,#1a3d2e 0%,#2d5a3d 60%,#3d7a5a 100%)",padding:"24px 16px 0",color:"#f0ebe3"},
    inner:{maxWidth:760,margin:"0 auto"},
    body:{maxWidth:760,margin:"0 auto",padding:"20px 14px"},
    card:{background:"#fff",borderRadius:12,boxShadow:"0 2px 12px rgba(44,36,22,.07)",padding:22},
    inp:{width:"100%",border:"1.5px solid #e0d8cc",borderRadius:8,padding:"10px 12px",fontSize:14,background:"#faf8f5",color:"#2c2416",outline:"none"},
    lbl:{fontSize:11,textTransform:"uppercase",letterSpacing:".08em",color:"#8a7a6a",marginBottom:5,display:"block"},
    pb:{background:"#2d7a5f",color:"#fff",border:"none",borderRadius:8,padding:"12px 24px",fontSize:14,cursor:"pointer"},
    gb:{background:"none",border:"1.5px solid #c8b89a",color:"#6a5a4a",borderRadius:8,padding:"10px 18px",fontSize:13,cursor:"pointer"},
  };

  const syncIndicator = syncStatus === "syncing" ? "○ Syncing…" : syncStatus === "error" ? "⚠ Sync error" : syncStatus === "ok" ? "✓ Synced" : "";
  const syncColor = syncStatus === "error" ? "#ff9090" : syncStatus === "syncing" ? "#f0c96a" : "#7dd4a8";

  if (loading) return (
    <div style={S.wrap}>
      <div style={{...S.hdr, padding:"60px 20px"}}>
        <div style={{...S.inner, textAlign:"center"}}>
          <div style={{fontSize:40, marginBottom:12}}>🦅</div>
          <h1 style={{fontFamily:"Georgia,serif",fontSize:24,color:"#f0ebe3",marginBottom:6}}>Falcon Hours</h1>
          <p style={{color:"#a0c8b0",fontSize:13}}>{errMsg || "Loading entries from Airtable…"}</p>
        </div>
      </div>
    </div>
  );

  if (syncStatus === "error" && entries.length === 0) return (
    <div style={S.wrap}>
      <div style={{...S.hdr, padding:"60px 20px"}}>
        <div style={{...S.inner, textAlign:"center"}}>
          <div style={{fontSize:40, marginBottom:12}}>⚠️</div>
          <h1 style={{fontFamily:"Georgia,serif",fontSize:24,color:"#f0ebe3",marginBottom:6}}>Connection Error</h1>
          <p style={{color:"#ff9090",fontSize:13,marginBottom:14}}>{errMsg}</p>
          <button style={{...S.pb,background:"#7dd4a8",color:"#1a3d2e"}} onClick={refresh}>Retry</button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={S.wrap}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Serif+4:wght@400;500&display=swap');
        .pf{font-family:'Playfair Display',Georgia,serif}
        .sf{font-family:'Source Serif 4',Georgia,serif}
        input,select,textarea,button{font-family:'Source Serif 4',Georgia,serif}
        .nb{background:none;border:none;padding:10px 14px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:#a0b8a8;border-bottom:2px solid transparent;cursor:pointer;transition:color .2s}
        .nb.on{color:#7dd4a8;border-bottom:2px solid #7dd4a8}
        .nb:hover{color:#7dd4a8}
        .inp-f:focus{border-color:#2d7a5f!important}
        .pb-h:hover{background:#235f4a!important}
        .gb-h:hover{border-color:#2d7a5f!important;color:#2d7a5f!important}
        .db{background:none;border:none;color:#ccc;font-size:15px;padding:4px 8px;border-radius:6px;cursor:pointer}
        .db:hover{color:#e05050}
        .tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
      `}</style>

      <div style={S.hdr}>
        <div style={S.inner}>
          <div style={{display:"flex",alignItems:"flex-end",gap:12,marginBottom:4,flexWrap:"wrap"}}>
            <span style={{fontSize:28}}>🦅</span>
            <div>
              <h1 className="pf" style={{fontSize:24,color:"#f0ebe3"}}>Falcon Hours</h1>
              <p className="sf" style={{fontSize:11,color:"#a0c8b0",letterSpacing:".05em"}}>SHORT-TERM RENTAL TIME TRACKER</p>
            </div>
            <div style={{marginLeft:"auto",textAlign:"right"}}>
              <div className="pf" style={{fontSize:26,color:"#f0c96a"}}>{fmt(total)}</div>
              <div style={{fontSize:11,color:"#a0c8b0",letterSpacing:".06em"}}>{entries.length} ENTRIES</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:8,gap:12,flexWrap:"wrap"}}>
            <div style={{display:"flex",gap:2}}>
              {[["log","Log"],["dashboard","Stats"],["history","History"]].map(([v,l]) => (
                <button key={v} className={`nb${view===v?" on":""}`} onClick={() => setView(v)}>{l}</button>
              ))}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:11,color:syncColor}}>{syncIndicator}</span>
              <button onClick={refresh} style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"#e0e8e0",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>↻ Refresh</button>
            </div>
          </div>
        </div>
      </div>

      <div style={S.body}>

        {view === "log" && (
          <div style={{display:"grid",gap:18}}>
            <div style={{...S.card,borderLeft:"4px solid #c07c2a"}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                <span style={{fontSize:20}}>⏱</span>
                <span className="pf" style={{fontSize:18}}>Live Timer</span>
                {tim.running && <span style={{marginLeft:"auto",fontFamily:"monospace",fontSize:22,color:"#c07c2a",fontWeight:700}}>{tFmt(tim.elapsed)}</span>}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                <div><label style={S.lbl}>Property</label><select style={S.inp} className="inp-f" value={tim.property} onChange={e => setTim(t => ({...t, property: e.target.value}))} disabled={tim.running}>{PROPERTIES.map(p => <option key={p}>{p}</option>)}</select></div>
                <div><label style={S.lbl}>Category</label><select style={S.inp} className="inp-f" value={tim.category} onChange={e => setTim(t => ({...t, category: e.target.value}))} disabled={tim.running}>{CATEGORIES.map(c => <option key={c}>{c}</option>)}</select></div>
              </div>
              {!tim.running
                ? <button style={{...S.pb,background:"#c07c2a"}} className="pb-h" onClick={startTimer}>▶ Start Timer</button>
                : <button style={{...S.pb,background:"#e05050"}} className="pb-h" onClick={stopTimer}>⏹ Stop & Save</button>
              }
            </div>

            <div style={S.card}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><span style={{fontSize:20}}>✍️</span><span className="pf" style={{fontSize:18}}>Manual Entry</span></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                <div><label style={S.lbl}>Property</label><select style={S.inp} className="inp-f" value={form.property} onChange={e => setForm(f => ({...f, property: e.target.value}))}>{PROPERTIES.map(p => <option key={p}>{p}</option>)}</select></div>
                <div><label style={S.lbl}>Category</label><select style={S.inp} className="inp-f" value={form.category} onChange={e => setForm(f => ({...f, category: e.target.value}))}>{CATEGORIES.map(c => <option key={c}>{c}</option>)}</select></div>
                <div><label style={S.lbl}>Date</label><input type="date" style={S.inp} className="inp-f" value={form.date} onChange={e => setForm(f => ({...f, date: e.target.value}))} /></div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <div><label style={S.lbl}>Hours</label><input type="number" inputMode="numeric" style={S.inp} className="inp-f" min="0" max="24" placeholder="0" value={form.hours} onChange={e => setForm(f => ({...f, hours: e.target.value}))} /></div>
                  <div><label style={S.lbl}>Mins</label><input type="number" inputMode="numeric" style={S.inp} className="inp-f" min="0" max="59" placeholder="0" value={form.minutes} onChange={e => setForm(f => ({...f, minutes: e.target.value}))} /></div>
                </div>
              </div>
              <div style={{marginBottom:12}}><label style={S.lbl}>Notes (optional)</label><input style={S.inp} className="inp-f" placeholder="What did you do?" value={form.note} onChange={e => setForm(f => ({...f, note: e.target.value}))} /></div>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <button style={S.pb} className="pb-h" onClick={addEntry} disabled={syncStatus==="syncing"}>+ Log Entry</button>
                {saved && <span style={{color:"#2d7a5f",fontSize:13}}>✓ Saved to Airtable!</span>}
              </div>
            </div>

            <div style={{...S.card,padding:"14px 22px"}}>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <span style={{fontSize:11,color:"#8a7a6a",letterSpacing:".05em"}}>PROPERTIES:</span>
                {PROPERTIES.map((p,i) => <span key={p} className="tag" style={{background:PROP_COLORS[i%PROP_COLORS.length]+"22",color:PROP_COLORS[i%PROP_COLORS.length],border:`1px solid ${PROP_COLORS[i%PROP_COLORS.length]}44`}}>{p}</span>)}
              </div>
              <p style={{fontSize:11,color:"#8a7a6a",marginTop:8}}>To add or rename a property, edit the Property single-select field directly in Airtable. Changes appear here on refresh.</p>
            </div>
          </div>
        )}

        {view === "dashboard" && (
          <div style={{display:"grid",gap:18}}>
            <div style={S.card}>
              <h2 className="pf" style={{fontSize:18,marginBottom:16}}>Hours by Property</h2>
              {PROPERTIES.map((p,i) => {
                const m = byProp[p] || 0, pc = total ? (m/total)*100 : 0;
                return (
                  <div key={p} style={{marginBottom:12}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:14,fontWeight:500}}>{p}</span><span style={{fontSize:14,color:"#8a7a6a"}}>{fmt(m)}</span></div>
                    <div style={{height:8,background:"#f0ebe3",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${pc}%`,background:PROP_COLORS[i%PROP_COLORS.length],borderRadius:4,transition:"width .6s ease"}} /></div>
                  </div>
                );
              })}
            </div>
            <div style={S.card}>
              <h2 className="pf" style={{fontSize:18,marginBottom:16}}>Hours by Category</h2>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {CATEGORIES.map(c => {
                  const m = byCat[c] || 0, {bg,accent,icon} = CAT_COLORS[c];
                  return (
                    <div key={c} style={{background:bg,borderRadius:10,padding:"12px 14px",borderLeft:`3px solid ${accent}`}}>
                      <div style={{fontSize:18,marginBottom:4}}>{icon}</div>
                      <div style={{fontSize:10,color:accent,letterSpacing:".04em",textTransform:"uppercase",marginBottom:2}}>{c}</div>
                      <div className="pf" style={{fontSize:20,color:"#2c2416"}}>{fmt(m)}</div>
                    </div>
                  );
                })}
              </div>
            </div>
            <div style={S.card}>
              <h2 className="pf" style={{fontSize:18,marginBottom:16}}>Weekly Activity</h2>
              {wks.length === 0 && <p style={{color:"#a0907a",fontSize:14}}>No entries yet.</p>}
              {wks.map(([wk,m]) => (
                <div key={wk} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,color:"#8a7a6a"}}>Wk of {wk}</span><span style={{fontSize:13,fontWeight:500}}>{fmt(m)}</span></div>
                  <div style={{height:10,background:"#f0ebe3",borderRadius:5,overflow:"hidden"}}><div style={{height:"100%",width:`${(m/mxW)*100}%`,background:"linear-gradient(90deg,#2d7a5f,#7dd4a8)",borderRadius:5}} /></div>
                </div>
              ))}
            </div>
            <div style={{...S.card, border:"1.5px solid #f0d0d0", background:"#fff8f8"}}>
              <h3 className="pf" style={{fontSize:14,marginBottom:6,color:"#c04040"}}>⚠️ Danger Zone — Reseed from Code</h3>
              <p style={{fontSize:11,color:"#a06060",marginBottom:12,lineHeight:1.5}}>
                Deletes all entries in Airtable and re-uploads the latest historical dataset baked into this app's code ({SEED_DATA.length} entries, {fmt(SEED_DATA.reduce((a,e)=>a+e.minutes,0))}). Use this when the developer has updated the seed data.
              </p>
              <button onClick={reseedFromCode} style={{background:"none",border:"1.5px solid #e08080",color:"#c04040",borderRadius:8,padding:"8px 16px",fontSize:12,cursor:"pointer"}}>
                Wipe Airtable & Reseed from Code
              </button>
            </div>
          </div>
        )}

        {view === "history" && (
          <div style={{display:"grid",gap:14}}>
            <div style={{...S.card, padding:"14px 18px"}}>
              <div style={{marginBottom:10}}>
                <div style={{fontSize:11,color:"#8a7a6a",letterSpacing:".05em",textTransform:"uppercase",marginBottom:8}}>🏡 Properties {fProps.length>0 && <span style={{color:"#2d7a5f",fontWeight:600}}>({fProps.length} selected)</span>}</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {PROPERTIES.map((p,i) => {
                    const active = fProps.includes(p);
                    const c = PROP_COLORS[i%PROP_COLORS.length];
                    return (
                      <button key={p} onClick={() => toggleProp(p)} style={{
                        background: active ? c : c+"15",
                        color: active ? "#fff" : c,
                        border: `1.5px solid ${active ? c : c+"55"}`,
                        borderRadius: 20, padding: "5px 14px", fontSize: 12, fontWeight: 500, cursor: "pointer",
                        transition: "all .15s"
                      }}>{active && "✓ "}{p}</button>
                    );
                  })}
                </div>
              </div>
              <div style={{borderTop:"1px solid #f0ebe3",paddingTop:10}}>
                <div style={{fontSize:11,color:"#8a7a6a",letterSpacing:".05em",textTransform:"uppercase",marginBottom:8}}>📋 Categories {fCats.length>0 && <span style={{color:"#2d7a5f",fontWeight:600}}>({fCats.length} selected)</span>}</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {CATEGORIES.map(c => {
                    const active = fCats.includes(c);
                    const cc = CAT_COLORS[c];
                    return (
                      <button key={c} onClick={() => toggleCat(c)} style={{
                        background: active ? cc.accent : cc.bg,
                        color: active ? "#fff" : cc.accent,
                        border: `1.5px solid ${active ? cc.accent : cc.accent+"33"}`,
                        borderRadius: 20, padding: "5px 12px", fontSize: 11, fontWeight: 500, cursor: "pointer",
                        transition: "all .15s"
                      }}>{cc.icon} {active && "✓ "}{c}</button>
                    );
                  })}
                </div>
              </div>
            </div>
            <div style={{...S.card, padding:"14px 18px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,flexWrap:"wrap",gap:8}}>
                <span style={{fontSize:11,color:"#8a7a6a",letterSpacing:".05em",textTransform:"uppercase"}}>📅 Date Range</span>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <button onClick={() => { const d=new Date(); const s=new Date(d); s.setDate(d.getDate()-7); setFStart(s.toISOString().slice(0,10)); setFEnd(d.toISOString().slice(0,10)); }} style={{background:"#f0ebe3",border:"1px solid #d8d0c0",color:"#6a5a4a",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>Last 7 days</button>
                  <button onClick={() => { const d=new Date(); const s=new Date(d); s.setDate(d.getDate()-30); setFStart(s.toISOString().slice(0,10)); setFEnd(d.toISOString().slice(0,10)); }} style={{background:"#f0ebe3",border:"1px solid #d8d0c0",color:"#6a5a4a",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>Last 30 days</button>
                  <button onClick={() => { const d=new Date(); setFStart(`${d.getFullYear()}-01-01`); setFEnd(d.toISOString().slice(0,10)); }} style={{background:"#f0ebe3",border:"1px solid #d8d0c0",color:"#6a5a4a",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>This year</button>
                  {(fStart || fEnd || fProps.length>0 || fCats.length>0) && <button onClick={() => { setFStart(""); setFEnd(""); setFProps([]); setFCats([]); }} style={{background:"none",border:"1px solid #e0a0a0",color:"#c04040",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>✕ Clear all</button>}
                </div>
              </div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"end"}}>
                <div style={{flex:1,minWidth:120}}>
                  <label style={{...S.lbl,marginBottom:3}}>From</label>
                  <input type="date" style={S.inp} className="inp-f" value={fStart} onChange={e => setFStart(e.target.value)} max={fEnd || undefined} />
                </div>
                <div style={{flex:1,minWidth:120}}>
                  <label style={{...S.lbl,marginBottom:3}}>To</label>
                  <input type="date" style={S.inp} className="inp-f" value={fEnd} onChange={e => setFEnd(e.target.value)} min={fStart || undefined} />
                </div>
              </div>
            </div>
            <div style={{fontSize:12,color:"#8a7a6a"}}>{filtered.length} entries · {fmt(filtered.reduce((a,e) => a+e.minutes, 0))} total{fStart||fEnd ? ` · ${fStart || "earliest"} → ${fEnd || "latest"}` : ""}</div>
            {filtered.length === 0 && <div style={{...S.card,color:"#a0907a",textAlign:"center",padding:40}}>No entries found.</div>}
            {filtered.map(e => {
              const {accent,icon} = CAT_COLORS[e.category] || {accent:"#2d7a5f",icon:"📝"};
              return (
                <div key={e.id} style={{...S.card,display:"flex",alignItems:"flex-start",gap:12,borderLeft:`3px solid ${accent}`,padding:"12px 18px"}}>
                  <span style={{fontSize:18,marginTop:2}}>{icon}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                      <span style={{fontSize:14,fontWeight:500}}>{e.property}</span>
                      <span className="tag" style={{background:accent+"18",color:accent}}>{e.category}</span>
                    </div>
                    {e.note && <div style={{fontSize:12,color:"#6a5a4a",marginTop:4,lineHeight:1.5}}>{e.note}</div>}
                    <div style={{fontSize:11,color:"#b0a090",marginTop:4}}>{fmtDate(e.date)}</div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
                    <div className="pf" style={{fontSize:18,color:"#2c2416"}}>{fmt(e.minutes)}</div>
                    <button className="db" onClick={() => deleteEntry(e.id)}>✕</button>
                  </div>
                </div>
              );
            })}
          </div>
        )}

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
